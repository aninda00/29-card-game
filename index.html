<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>29 Card Game</title>
<link id="favicon" rel="icon" type="image/png" href="">
<script>
  // Generate favicon using canvas
  const c = document.createElement('canvas');
  c.width = c.height = 64;
  const x = c.getContext('2d');
  // Background
  x.fillStyle = '#1a1a2e';
  x.beginPath();
  x.roundRect(0, 0, 64, 64, 10);
  x.fill();
  // Text
  x.fillStyle = '#7c6fff';
  x.font = 'bold 30px Segoe UI, sans-serif';
  x.textAlign = 'center';
  x.textBaseline = 'middle';
  x.fillText('29', 32, 34);
  document.getElementById('favicon').href = c.toDataURL('image/png');
</script>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{background:#1a1a2e;color:#e0e0e0;font-family:'Segoe UI',sans-serif;min-height:100vh;display:flex;align-items:center;justify-content:center;}
.screen{display:none;flex-direction:column;align-items:center;justify-content:center;width:100%;min-height:100vh;gap:12px;padding:20px;}
.screen.active{display:flex;}
#main-screen{display:none;flex-direction:column;height:100vh;width:100%;background:#1a1a2e;}
#main-screen.active{display:flex;}
h1{font-size:2.2rem;font-weight:300;letter-spacing:6px;color:#fff;}
.sub{font-size:0.78rem;color:#666;letter-spacing:2px;text-transform:uppercase;}
.inp{background:#242438;border:1px solid #2a2a45;color:#ddd;padding:11px 16px;border-radius:5px;font-size:0.9rem;outline:none;width:100%;max-width:280px;}
.inp:focus{border-color:#7c6fff;}
.inp.code{letter-spacing:6px;text-align:center;text-transform:uppercase;font-size:1.1rem;max-width:160px;}
.btn{background:transparent;border:1px solid #3a3a55;color:#bbb;padding:11px 26px;border-radius:5px;cursor:pointer;font-size:0.85rem;letter-spacing:1px;transition:all 0.18s;white-space:nowrap;}
.btn:hover{border-color:#888;color:#fff;}
.btn.pri{border-color:#7c6fff;color:#7c6fff;}
.btn.pri:hover{background:#7c6fff18;}
.btn.red{border-color:#e05555;color:#e05555;}
.btn.red:hover{background:#e0555518;}
.btn.gold{border-color:#c9a84c;color:#c9a84c;}
.btn.gold:hover{background:#c9a84c18;}
.row{display:flex;gap:10px;align-items:center;justify-content:center;flex-wrap:wrap;}
.code-box{font-size:1.8rem;letter-spacing:10px;color:#7c6fff;background:#1e1e34;border:1px solid #2a2a45;border-radius:8px;padding:12px 24px;text-align:center;min-width:200px;}
.plist{list-style:none;width:100%;max-width:300px;margin-top:4px;}
.plist li{padding:8px 14px;border-radius:5px;font-size:0.82rem;color:#555;border:1px solid #1e1e34;margin-bottom:4px;background:#191929;}
.plist li.joined{color:#ccc;border-color:#2a2a45;}
.plist li.me{color:#7c6fff;border-color:#7c6fff44;}
#info-bar{display:flex;justify-content:space-between;align-items:center;padding:7px 16px;border-bottom:1px solid #222240;flex-wrap:wrap;gap:6px;}
.teams{display:flex;gap:18px;}
.tm{display:flex;flex-direction:column;align-items:center;}
.tm .lbl{font-size:0.58rem;color:#555;letter-spacing:1px;}
.tm .val{font-size:1rem;color:#ccc;font-weight:300;}
#trump-disp{font-size:1.3rem;}
#bid-disp{font-size:0.72rem;color:#777;text-align:center;}
#table{flex:1;display:grid;grid-template-areas:". top ." "left center right" ". bottom .";grid-template-columns:110px 1fr 110px;grid-template-rows:100px 1fr 100px;padding:6px;gap:2px;}
.pa{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;}
.pa.bottom{grid-area:bottom;}.pa.top{grid-area:top;}.pa.left{grid-area:left;}.pa.right{grid-area:right;}
.pn{font-size:0.62rem;letter-spacing:1px;color:#444;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;max-width:100px;text-align:center;}
.pn.cur{color:#7c6fff;}
.hand{display:flex;justify-content:center;flex-wrap:wrap;}
.hand.v{flex-direction:column;}
.card{width:40px;height:56px;border-radius:5px;border:1px solid #2a2a45;background:#20203a;display:flex;flex-direction:column;align-items:center;justify-content:center;cursor:pointer;transition:transform 0.13s,box-shadow 0.13s;user-select:none;flex-shrink:0;margin:1px;}
.card:hover{transform:translateY(-7px);box-shadow:0 8px 18px #0006;}
.card.off{opacity:0.3;cursor:not-allowed;}
.card.off:hover{transform:none;box-shadow:none;}
.card.back{background:#181830;border-color:#222240;cursor:default;}
.card.back:hover{transform:none;}
.card .r{font-size:0.78rem;font-weight:600;line-height:1.1;}
.card .s{font-size:0.88rem;line-height:1.1;}
.card.red .r,.card.red .s{color:#e05555;}
.card.blk .r,.card.blk .s{color:#ddd;}
.card.sm{width:28px;height:40px;margin:1px;}
.card.sm .r{font-size:0.58rem;}.card.sm .s{font-size:0.65rem;}
.bp{width:22px;height:32px;border-radius:3px;background:repeating-linear-gradient(45deg,#252548,#252548 2px,#1a1a38 2px,#1a1a38 6px);}
#center{grid-area:center;display:flex;align-items:center;justify-content:center;position:relative;}
#trick-area{display:grid;grid-template-areas:". top ." "left mid right" ". bottom .";grid-template-columns:54px 54px 54px;grid-template-rows:64px 64px 64px;gap:2px;}
.tp{display:flex;align-items:center;justify-content:center;}
.tp.tb{grid-area:bottom;}.tp.tt{grid-area:top;}.tp.tl{grid-area:left;}.tp.tr{grid-area:right;}
#cstatus{position:absolute;font-size:0.65rem;color:#2a2a45;letter-spacing:2px;pointer-events:none;}
#trick-msg{position:absolute;background:#1a1a34dd;border:1px solid #2a2a45;border-radius:6px;padding:5px 14px;font-size:0.72rem;color:#aaa;opacity:0;transition:opacity 0.25s;pointer-events:none;}
#trick-msg.show{opacity:1;}
#controls{padding:8px 16px;border-top:1px solid #222240;display:flex;justify-content:center;align-items:center;gap:10px;min-height:48px;flex-wrap:wrap;}
#cmsg{font-size:0.74rem;color:#777;}
.ov{display:none;position:fixed;inset:0;background:#000d;z-index:60;flex-direction:column;align-items:center;justify-content:center;gap:14px;padding:20px;}
.ov.on{display:flex;}
.ov-title{font-size:0.78rem;letter-spacing:2px;color:#555;text-transform:uppercase;}
.prev-hand{display:flex;gap:4px;margin:4px 0;}
.bbrow{display:flex;gap:6px;flex-wrap:wrap;justify-content:center;max-width:300px;}
.bbrow .btn{padding:7px 12px;font-size:0.76rem;}
.suit-row{display:flex;gap:14px;}
.suit-btn{width:60px;height:60px;border-radius:8px;border:1px solid #2a2a45;background:transparent;font-size:1.7rem;cursor:pointer;transition:all 0.18s;}
.suit-btn:hover{border-color:#7c6fff;background:#7c6fff18;transform:scale(1.06);}
.wait{font-size:0.8rem;color:#444;letter-spacing:2px;}
.bidinfo{font-size:0.88rem;color:#aaa;}
.bidinfo span{color:#7c6fff;font-weight:600;}
#result-modal{display:none;position:fixed;inset:0;background:#000a;z-index:100;align-items:center;justify-content:center;}
#result-modal.on{display:flex;}
.modal{background:#1a1a30;border:1px solid #2a2a45;border-radius:10px;padding:28px 32px;text-align:center;max-width:320px;width:100%;}
.modal h2{font-size:1rem;font-weight:400;margin-bottom:6px;}
.modal .big{font-size:1.5rem;color:#7c6fff;margin:8px 0;}
.stbl{width:100%;font-size:0.76rem;border-collapse:collapse;margin-bottom:14px;}
.stbl td{padding:4px 8px;color:#666;}
.stbl td:last-child{text-align:right;color:#bbb;}
.stbl tr.hi td{color:#7c6fff;}
.tag{display:inline-block;font-size:0.58rem;padding:1px 6px;border-radius:10px;margin-left:4px;vertical-align:middle;}
.tag.d{border:1px solid #e05555;color:#e05555;}
.tag.m{border:1px solid #c9a84c;color:#c9a84c;}
#toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:#1a1a30;border:1px solid #2a2a45;padding:8px 20px;border-radius:20px;font-size:0.76rem;color:#bbb;opacity:0;transition:opacity 0.25s;pointer-events:none;z-index:200;white-space:nowrap;}
#toast.on{opacity:1;}
</style>
</head>
<body>

<!-- HOME -->
<div id="home-screen" class="screen active">
  <h1>29</h1>
  <div class="sub">Online Multiplayer</div>
  <div style="height:6px"></div>
  <input class="inp" id="inp-name" placeholder="Your name" maxlength="16"/>
  <div class="row" style="margin-top:2px">
    <button class="btn pri" onclick="createRoom()">CREATE ROOM</button>
  </div>
  <div class="row">
    <input class="inp code" id="inp-code" placeholder="CODE" maxlength="4"/>
    <button class="btn" onclick="joinRoom()">JOIN</button>
  </div>
  <div style="font-size:0.68rem;color:#333;margin-top:6px">4 players · P1&P3 vs P2&P4</div>
</div>

<!-- LOBBY -->
<div id="lobby-screen" class="screen">
  <div class="sub">Room Code</div>
  <div class="code-box" id="lobby-code">----</div>
  <div style="font-size:0.7rem;color:#444;margin-bottom:4px">Share this code with your friends</div>
  <ul class="plist" id="plist"></ul>
  <div id="lobby-msg" style="font-size:0.74rem;color:#555;margin-top:4px"></div>
  <button class="btn pri" id="start-btn" style="display:none;margin-top:10px" onclick="hostStart()">START GAME</button>
</div>

<!-- MAIN GAME -->
<div id="main-screen" class="screen">
  <div id="info-bar">
    <div class="teams">
      <div class="tm"><div class="lbl" id="lbl-a">P1&P3</div><div class="val" id="sc-a">0</div></div>
      <div class="tm"><div class="lbl" id="lbl-b">P2&P4</div><div class="val" id="sc-b">0</div></div>
    </div>
    <div id="bid-disp">Bid: —</div>
    <div id="trump-disp">🂠</div>
  </div>
  <div id="table">
    <div class="pa top"><div class="pn" id="nm-top">—</div><div class="hand" id="h-top"></div></div>
    <div class="pa left"><div class="pn" id="nm-left">—</div><div class="hand v" id="h-left"></div></div>
    <div id="center">
      <div id="trick-area"></div>
      <div id="cstatus">WAITING</div>
      <div id="trick-msg"></div>
    </div>
    <div class="pa right"><div class="pn" id="nm-right">—</div><div class="hand v" id="h-right"></div></div>
    <div class="pa bottom"><div class="pn" id="nm-bottom">YOU</div><div class="hand" id="h-bottom"></div></div>
  </div>
  <div id="controls">
    <div id="cmsg">—</div>
    <button class="btn" id="reveal-btn" style="display:none" onclick="doReveal()">REVEAL TRUMP</button>
    <button class="btn gold" id="marry-btn" style="display:none" onclick="doMarriage()">💍 MARRIAGE</button>
  </div>
</div>

<!-- BID OVERLAY -->
<div id="bid-ov" class="ov">
  <div class="ov-title">Bidding — Your First 4 Cards</div>
  <div class="prev-hand" id="bid-prev"></div>
  <div class="bidinfo">Bid: <span id="bid-val">—</span> by <span id="bid-who">—</span></div>
  <div class="bbrow" id="bid-btns"></div>
  <div id="bid-pass"></div>
  <div class="wait" id="bid-wait" style="display:none"></div>
</div>

<!-- TRUMP OVERLAY -->
<div id="trump-ov" class="ov">
  <div class="ov-title">Choose Trump Suit</div>
  <div style="font-size:0.78rem;color:#555;" id="trump-info"></div>
  <div class="suit-row">
    <button class="suit-btn" onclick="doTrump('♠')">♠</button>
    <button class="suit-btn" onclick="doTrump('♥')">♥</button>
    <button class="suit-btn" onclick="doTrump('♦')">♦</button>
    <button class="suit-btn" onclick="doTrump('♣')">♣</button>
  </div>
</div>

<!-- DOUBLE OVERLAY -->
<div id="dbl-ov" class="ov">
  <div class="ov-title">Double?</div>
  <div style="font-size:0.8rem;color:#666;text-align:center;line-height:1.8" id="dbl-info"></div>
  <div class="row" id="dbl-btns"></div>
  <div class="wait" id="dbl-wait" style="display:none"></div>
</div>

<!-- RESULT MODAL -->
<div id="result-modal">
  <div class="modal">
    <h2 id="res-title">Round Over</h2>
    <div class="big" id="res-main"></div>
    <table class="stbl" id="res-tbl"></table>
    <button class="btn pri" onclick="playAgain()">PLAY AGAIN</button>
  </div>
</div>
<div id="toast"></div>

<script type="module">
import { initializeApp }
  from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getDatabase, ref, set, get, update, onValue, off }
  from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

const app = initializeApp({
  apiKey:           "AIzaSyDPjd-rIUrp6HCxTSVTLqrWg_klxQDwCtY",
  authDomain:       "game-29-177ab.firebaseapp.com",
  databaseURL:      "https://game-29-177ab-default-rtdb.firebaseio.com",
  projectId:        "game-29-177ab",
  storageBucket:    "game-29-177ab.firebasestorage.app",
  messagingSenderId:"412974228088",
  appId:            "1:412974228088:web:e0cc330bb9a1892eaac38d",
});
const db = getDatabase(app);

// ── CONSTANTS ──
const SUITS = ['♠','♥','♦','♣'];
const RANKS = ['7','8','9','10','J','Q','K','A'];
const PTS   = {7:0,8:0,9:2,10:1,J:3,Q:0,K:0,A:1};
const ORD   = {7:0,8:1,Q:2,K:3,10:4,A:5,9:6,J:7};

// ── STATE ──
let myRoom=null, mySeat=null, G=null, players={};
let busy=false, resolveTimer=null;

// ── FIREBASE ──
const R = p => ref(db, p ? `rooms/${myRoom}/${p}` : `rooms/${myRoom}`);

// Safely convert Firebase object/array to JS array
function A(x, len=0){
  if(!x) return Array(len).fill(null);
  if(Array.isArray(x)) return x;
  let keys=Object.keys(x).map(Number);
  let max=Math.max(len-1,...keys);
  let out=[];
  for(let i=0;i<=max;i++) out.push(x[i]!==undefined?x[i]:null);
  return out;
}
const N = v => Number(v)||0;

// ── UTILS ──
function shuffle(a){let b=[...a];for(let i=b.length-1;i>0;i--){let j=Math.random()*(i+1)|0;[b[i],b[j]]=[b[j],b[i]];}return b;}
function code4(){return Math.random().toString(36).slice(2,6).toUpperCase();}
function pn(s){return players[s]||`P${N(s)+1}`;}
function screen(id){document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));document.getElementById(id).classList.add('active');}
function ov(id){['bid-ov','trump-ov','dbl-ov'].forEach(o=>document.getElementById(o).classList.remove('on'));if(id)document.getElementById(id).classList.add('on');}
function msg(t){document.getElementById('cmsg').textContent=t;}
function toast(t){let e=document.getElementById('toast');e.textContent=t;e.classList.add('on');setTimeout(()=>e.classList.remove('on'),2400);}
function trickMsg(t){let e=document.getElementById('trick-msg');e.textContent=t;e.classList.add('show');setTimeout(()=>e.classList.remove('show'),1300);}

// ── LOBBY ──
async function createRoom(){
  let name=document.getElementById('inp-name').value.trim()||'Player 1';
  myRoom=code4(); mySeat=0;
  try{
    await set(R(),{players:{0:name},status:'lobby'});
    document.getElementById('lobby-code').textContent=myRoom;
    screen('lobby-screen');
    listenLobby();
  }catch(e){
    alert('Could not create room.\n\nError: '+e.message+'\n\nCheck Firebase rules:\n{\n  "rules":{\n    ".read":true,\n    ".write":true\n  }\n}');
    myRoom=null;
  }
}

async function joinRoom(){
  let name=document.getElementById('inp-name').value.trim()||'Player';
  let code=document.getElementById('inp-code').value.trim().toUpperCase();
  if(!code||code.length<4){alert('Enter the 4-letter room code');return;}
  myRoom=code;
  try{
    let d=(await get(R())).val();
    if(!d){alert('Room "'+code+'" not found.');myRoom=null;return;}
    if(d.status!=='lobby'){alert('Game already started.');myRoom=null;return;}
    let taken=Object.keys(d.players||{}).map(Number);
    let seat=[0,1,2,3].find(s=>!taken.includes(s));
    if(seat===undefined){alert('Room is full.');myRoom=null;return;}
    mySeat=seat;
    await update(R('players'),{[seat]:name});
    document.getElementById('lobby-code').textContent=myRoom;
    screen('lobby-screen');
    listenLobby();
  }catch(e){alert('Error: '+e.message);myRoom=null;}
}

function listenLobby(){
  onValue(R(),snap=>{
    let d=snap.val(); if(!d) return;
    players=d.players||{};
    let ul=document.getElementById('plist');
    ul.innerHTML='';
    for(let s=0;s<4;s++){
      let li=document.createElement('li');
      let nm=players[s];
      li.textContent=nm?`Seat ${s+1}:  ${nm}${s==mySeat?' (You)':''}`:`Seat ${s+1}:  waiting...`;
      li.className=nm?(s==mySeat?'me':'joined'):'';
      ul.appendChild(li);
    }
    let cnt=Object.keys(players).length;
    document.getElementById('lobby-msg').textContent=cnt<4?`Waiting for ${4-cnt} more...`:'All players ready!';
    document.getElementById('start-btn').style.display=(mySeat===0&&cnt===4)?'inline-block':'none';
    if(d.status==='playing'&&d.game){
      off(R()); G=d.game; players=d.players||{};
      screen('main-screen'); listenGame(); render();
    }
  });
}

// ── HOST START ──
async function hostStart(){
  let deck=shuffle(SUITS.flatMap(s=>RANKS.map(r=>({suit:s,rank:r}))));
  let f4=[deck.slice(0,4),deck.slice(4,8),deck.slice(8,12),deck.slice(12,16)];
  let l4=[deck.slice(16,20),deck.slice(20,24),deck.slice(24,28),deck.slice(28,32)];
  let game={
    f4,l4,
    hands:f4.map(h=>h.map(c=>({...c}))),
    bid:15,bidder:-1,bidWinner:-1,
    trump:null,trumpR:false,
    doubled:false,married:false,
    trick:[null,null,null,null],
    leader:0,cur:0,
    tp:[0,0],tw:[0,0],played:0,
    phase:'bid',pass:0,
    total:[0,0],dvotes:{},
  };
  await update(R(),{status:'playing',game});
}

// ── GAME LISTENER ──
function listenGame(){
  onValue(R('game'),snap=>{
    let d=snap.val(); if(!d) return;
    G=d; render();
  });
}

// ── RENDER ──
function render(){
  if(!G) return;
  renderBar(); renderNames(); renderHands(); renderTrick(); renderUI();
}

function renderBar(){
  let td=document.getElementById('trump-disp');
  if(G.trumpR){td.textContent=G.trump;td.style.color=(G.trump==='♥'||G.trump==='♦')?'#e05555':'#ddd';}
  else{td.textContent='🂠';td.style.color='';}
  let dt=G.doubled?'<span class="tag d">DOUBLED</span>':'';
  let mt=G.married?'<span class="tag m">MARRIAGE</span>':'';
  let by=N(G.bidWinner)>=0&&G.bidWinner!==null?pn(G.bidWinner):(G.bidder>=0?pn(G.bidder):'—');
  document.getElementById('bid-disp').innerHTML=`Bid: ${G.bid} (${by})${dt}${mt}`;
  let tp=A(G.tp,2);
  document.getElementById('sc-a').textContent=N(tp[0]);
  document.getElementById('sc-b').textContent=N(tp[1]);
  document.getElementById('lbl-a').textContent=`${pn(0)}&${pn(2)}`;
  document.getElementById('lbl-b').textContent=`${pn(1)}&${pn(3)}`;
}

function renderNames(){
  let pos=['bottom','left','top','right'];
  for(let r=0;r<4;r++){
    let abs=(mySeat+r)%4;
    let el=document.getElementById('nm-'+pos[r]);
    if(!el) continue;
    el.textContent=r===0?'YOU':pn(abs);
    el.className='pn'+(N(G.cur)===abs?' cur':'');
  }
}

function renderHands(){
  let me=document.getElementById('h-bottom');
  me.innerHTML='';
  if(G.phase==='play'||G.phase==='over'){
    let hand=A(G.hands[mySeat]).filter(x=>x);
    hand.forEach((c,i)=>{
      let el=mkCard(c);
      if(N(G.cur)===mySeat&&valid(mySeat,c)) el.onclick=()=>play(i);
      else el.classList.add('off');
      me.appendChild(el);
    });
  }
  ['left','top','right'].forEach((pos,ri)=>{
    let abs=(mySeat+ri+1)%4;
    let el=document.getElementById('h-'+pos);
    el.innerHTML='';
    let n=A(G.hands[abs]).filter(x=>x).length;
    for(let i=0;i<n;i++) el.appendChild(mkBack());
  });
}

function renderTrick(){
  let ta=document.getElementById('trick-area');
  ta.innerHTML='';
  let trick=A(G.trick,4);
  let pos=['tb','tl','tt','tr'];
  for(let r=0;r<4;r++){
    let abs=(mySeat+r)%4;
    let wrap=document.createElement('div');
    wrap.className='tp '+pos[r];
    if(trick[abs]){let c=mkCard(trick[abs]);c.style.cursor='default';wrap.appendChild(c);}
    ta.appendChild(wrap);
  }
  document.getElementById('cstatus').style.display=trick.filter(x=>x).length?'none':'block';
}

// ── PHASE UI ──
function renderUI(){
  ov(null);
  document.getElementById('reveal-btn').style.display='none';
  document.getElementById('marry-btn').style.display='none';
  msg('');
  let p=G.phase;
  if(p==='bid')    uiBid();
  else if(p==='trump')  uiTrump();
  else if(p==='double') uiDouble();
  else if(p==='play')   uiPlay();
  else if(p==='over')   uiOver();
}

function uiBid(){
  ov('bid-ov');
  let prev=document.getElementById('bid-prev');
  prev.innerHTML='';
  A(G.f4[mySeat]).forEach(c=>{if(c)prev.appendChild(mkCard(c));});
  document.getElementById('bid-val').textContent=G.bidder>=0?G.bid:'—';
  document.getElementById('bid-who').textContent=G.bidder>=0?pn(G.bidder):'—';
  let btns=document.getElementById('bid-btns');
  let pp=document.getElementById('bid-pass');
  let wt=document.getElementById('bid-wait');
  btns.innerHTML=''; pp.innerHTML=''; wt.style.display='none';
  if(N(G.cur)===mySeat){
    for(let b=N(G.bid)+1;b<=28;b++){
      let btn=document.createElement('button');
      btn.className='btn'; btn.textContent=b;
      btn.style.cssText='padding:7px 11px;font-size:0.76rem;';
      btn.onclick=()=>doBid(b);
      btns.appendChild(btn);
    }
    if(G.bidder!==-1||N(G.pass)>0){
      let pb=document.createElement('button');
      pb.className='btn'; pb.textContent='PASS'; pb.onclick=()=>doBid(0);
      pp.appendChild(pb);
    }
  } else {
    wt.style.display='block';
    wt.textContent=N(G.cur)>=0?`${pn(G.cur).toUpperCase()} IS BIDDING...`:'WAITING...';
  }
}

function uiTrump(){
  if(N(G.bidWinner)===mySeat){
    ov('trump-ov');
    document.getElementById('trump-info').textContent=`You won the bid with ${G.bid}. Pick trump:`;
  } else {
    ov(null); msg(`${pn(G.bidWinner)} is choosing trump...`);
  }
}

function uiDouble(){
  let bidTeam=N(G.bidWinner)%2, myTeam=mySeat%2;
  let votes=G.dvotes||{}, myVote=votes[mySeat];
  if(myTeam!==bidTeam&&myVote===undefined){
    ov('dbl-ov');
    document.getElementById('dbl-info').textContent=`${pn(G.bidWinner)} bid ${G.bid}.\nDouble = ±2 game points instead of ±1.`;
    let db2=document.getElementById('dbl-btns'); db2.innerHTML='';
    let d=document.createElement('button');d.className='btn red';d.textContent='DOUBLE';d.onclick=()=>doDouble(true);
    let p=document.createElement('button');p.className='btn';p.textContent='PASS';p.onclick=()=>doDouble(false);
    db2.appendChild(d); db2.appendChild(p);
    document.getElementById('dbl-wait').style.display='none';
  } else if(myTeam!==bidTeam&&myVote!==undefined){
    ov('dbl-ov');
    document.getElementById('dbl-info').textContent='Waiting for your teammate to vote...';
    document.getElementById('dbl-btns').innerHTML='';
    document.getElementById('dbl-wait').style.display='block';
    document.getElementById('dbl-wait').textContent=`Your vote: ${myVote?'DOUBLE':'PASS'}`;
  } else {
    ov(null); msg('Opponents deciding whether to double...');
  }
}

function uiPlay(){
  ov(null);
  if(N(G.cur)===mySeat){
    msg('Your turn — play a card');
    // Show REVEAL TRUMP if trump not revealed AND
    // (bid winner can reveal anytime OR player can't follow led suit)
    if(!G.trumpR){
      let trick=A(G.trick,4);
      let led=null; for(let i=0;i<4;i++) if(trick[i]){led=trick[i];break;}
      let hand=A(G.hands[mySeat]).filter(x=>x);
      let cantFollow=led&&!hand.some(c=>c.suit===led.suit);
      let isBidWinner=N(G.bidWinner)===mySeat;
      if(isBidWinner||cantFollow)
        document.getElementById('reveal-btn').style.display='inline-block';
    }
    if(canMarry())
      document.getElementById('marry-btn').style.display='inline-block';
  } else {
    msg(`${pn(G.cur)}'s turn`);
  }
}

function uiOver(){
  ov(null);
  // ── SCORING ──
  // Bid team: +1 if met, -1 if not. ×2 if doubled.
  let bt=N(G.bidWinner)%2;
  let tp=A(G.tp,2).map(N);
  let met=tp[bt]>=N(G.bid);
  let mult=G.doubled?2:1;
  let total=A(G.total,2).map(N);
  // total was already computed in resolveTrick, just display
  let win=(mySeat%2===bt)===met;
  document.getElementById('res-title').textContent=win?'🎉 Your Team Wins!':'😔 Your Team Loses';
  document.getElementById('res-main').textContent=met?'Bid Met!':'Bid Failed!';
  // Show score delta
  let delta=met?`+${mult}`:`-${mult}`;
  let oppDelta=met?`-${mult}`:`+${mult}`;
  document.getElementById('res-tbl').innerHTML=`
    <tr><td>Bid</td><td>${G.bid} by ${pn(G.bidWinner)}</td></tr>
    <tr><td>${pn(0)}&${pn(2)} card pts</td><td>${tp[0]}</td></tr>
    <tr><td>${pn(1)}&${pn(3)} card pts</td><td>${tp[1]}</td></tr>
    ${G.doubled?'<tr class="hi"><td>Doubled</td><td>×2</td></tr>':''}
    ${G.married?'<tr class="hi"><td>Marriage</td><td>Bid −3</td></tr>':''}
    <tr><td colspan="2" style="padding-top:8px;border-top:1px solid #252540"></td></tr>
    <tr class="hi"><td>${pn(0)}&${pn(2)} game pts</td><td>${total[0]}</td></tr>
    <tr class="hi"><td>${pn(1)}&${pn(3)} game pts</td><td>${total[1]}</td></tr>
  `;
  document.getElementById('result-modal').classList.add('on');
}

// ── ACTIONS ──
async function doBid(val){
  if(N(G.cur)!==mySeat||G.phase!=='bid'||busy) return;
  busy=true;
  try{
    let pass=val===0?N(G.pass)+1:0;
    let bidr=val===0?G.bidder:mySeat;
    let bid=val===0?N(G.bid):val;
    let next=(mySeat+1)%4;
    let done=(pass>=3&&bidr!==-1)||pass===4;
    if(done){
      let bw=bidr===-1?0:bidr;
      let fb=bidr===-1?16:bid;
      let hands=A(G.f4).map((h,p)=>[...A(h),...A(A(G.l4)[p])]);
      await update(R('game'),{bid:fb,bidder:bw,bidWinner:bw,pass,hands,phase:'trump',cur:bw});
    } else {
      await update(R('game'),{bid,bidder:bidr,pass,cur:next});
    }
  }finally{busy=false;}
}

async function doTrump(suit){
  if(N(G.bidWinner)!==mySeat||G.phase!=='trump'||busy) return;
  busy=true;
  try{ await update(R('game'),{trump:suit,phase:'double',cur:-1,dvotes:{}}); }
  finally{busy=false;}
}

async function doDouble(val){
  let bt=N(G.bidWinner)%2;
  if(mySeat%2===bt||G.phase!=='double'||busy) return;
  busy=true;
  try{
    await update(R('game/dvotes'),{[mySeat]:val});
    let opp=[0,1,2,3].filter(s=>s%2!==bt);
    let snap=await get(R('game/dvotes'));
    let votes=snap.val()||{};
    if(opp.every(s=>votes[s]!==undefined)){
      let doubled=opp.some(s=>votes[s]===true);
      await update(R('game'),{doubled,phase:'play',cur:N(G.bidWinner),leader:N(G.bidWinner)});
    }
  }finally{busy=false;}
}

async function play(displayIdx){
  if(N(G.cur)!==mySeat||G.phase!=='play'||busy) return;
  busy=true;
  try{
    let rawHand=A(G.hands[mySeat]);
    let compacted=rawHand.filter(x=>x);
    let card=compacted[displayIdx];
    if(!card||!valid(mySeat,card)){busy=false;return;}

    // Remove first matching card from raw hand
    let found=false;
    let newHand=rawHand.filter(c=>{
      if(!found&&c&&c.rank===card.rank&&c.suit===card.suit){found=true;return false;}
      return !!c;
    });

    // Build trick safely
    let trick=A(G.trick,4).map(c=>c||null);
    trick[mySeat]=card;

    // Trump NEVER auto-reveals — only via REVEAL TRUMP button
    let cnt=trick.filter(x=>x).length;
    let next=cnt===4?-1:(mySeat+1)%4;

    await update(R('game'),{
      [`hands/${mySeat}`]:newHand,
      trick, cur:next,
    });

    if(cnt===4){
      // Clear any existing resolve timer
      if(resolveTimer) clearTimeout(resolveTimer);
      resolveTimer=setTimeout(async()=>{
        await resolveTrick();
        busy=false;
        resolveTimer=null;
      },1000);
    } else {
      busy=false;
    }
  }catch(e){console.error(e);busy=false;}
}

// ── RESOLVE TRICK ──
async function resolveTrick(){
  let snap=await get(R('game'));
  let g=snap.val();
  if(!g||g.phase!=='play') return;
  let trick=A(g.trick,4);
  if(trick.filter(x=>x).length<4) return;

  let leader=N(g.leader);
  let ls=trick[leader].suit;
  let winner=leader;
  for(let i=0;i<4;i++){
    if(!trick[i]||i===winner) continue;
    if(beats(trick[i],trick[winner],ls,g.trump,g.trumpR)) winner=i;
  }
  let team=winner%2;

  // Points — trump cards score 0 if trump not yet revealed when played
  let pts=trick.reduce((s,c)=>{
    if(!c) return s;
    if(!g.trumpR&&c.suit===g.trump) return s;
    return s+N(PTS[c.rank]);
  },0);

  let tp=A(g.tp,2).map(N);
  let tw=A(g.tw,2).map(N);
  tp[team]+=pts; tw[team]++;
  let played=N(g.played)+1;
  if(played===8) tp[team]+=1; // last trick bonus

  let isOver=played===8;

  // ── GAME POINT SCORING ──
  // Bid team +1 if met, -1 if not. ×2 if doubled.
  let total=A(g.total,2).map(N);
  if(isOver){
    let bt=N(g.bidWinner)%2;
    let met=tp[bt]>=N(g.bid);
    let mult=g.doubled?2:1;
    if(met){
      total[bt]   += mult;  // bid team gets +mult
      total[1-bt] -= mult;  // opposing team gets -mult
    } else {
      total[bt]   -= mult;  // bid team gets -mult
      total[1-bt] += mult;  // opposing team gets +mult
    }
  }

  trickMsg(`${pn(winner)} won +${pts}pts`);

  await update(R('game'),{
    trick:[null,null,null,null],
    tp,tw,played,
    leader:winner,cur:winner,
    total,
    phase:isOver?'over':'play',
  });
}

async function doReveal(){
  if(G.trumpR||G.phase!=='play') return;
  await update(R('game'),{trumpR:true});
}

async function doMarriage(){
  if(!canMarry()) return;
  let newBid=Math.max(15,N(G.bid)-3);
  await update(R('game'),{married:true,bid:newBid});
  toast('💍 Marriage! Bid reduced by 3');
}

async function playAgain(){
  document.getElementById('result-modal').classList.remove('on');
  if(mySeat===0) await update(R(),{status:'lobby',game:null});
  screen('lobby-screen'); listenLobby();
}

// ── CARD LOGIC ──
function cStr(c,ls,trump,rev){
  // Trump not revealed: trump cards treated as normal cards
  if(!rev) return N(PTS[c.rank])*10+N(ORD[c.rank]);
  if(c.suit===trump)  return 200+N(ORD[c.rank]);
  if(c.suit===ls)     return 100+N(ORD[c.rank]);
  return N(ORD[c.rank]);
}
function beats(c,w,ls,trump,rev){ return cStr(c,ls,trump,rev)>cStr(w,ls,trump,rev); }

function valid(p,card){
  if(!G||N(G.cur)!==p||G.phase!=='play') return false;
  let trick=A(G.trick,4);
  let led=null; for(let i=0;i<4;i++) if(trick[i]){led=trick[i];break;}
  if(!led) return true; // leading — any card
  let ls=led.suit;
  let hand=A(G.hands[p]).filter(x=>x);
  // Must follow led suit
  if(hand.some(c=>c.suit===ls)) return card.suit===ls;
  // Can't follow:
  // Trump revealed → must play trump if available
  if(G.trumpR&&hand.some(c=>c.suit===G.trump)) return card.suit===G.trump;
  // Trump not revealed → any card valid (trump = normal card)
  return true;
}

function canMarry(){
  if(!G||!G.trumpR||N(G.bidWinner)!==mySeat||G.married||G.phase!=='play') return false;
  let hand=A(G.hands[mySeat]).filter(x=>x);
  return hand.some(c=>c.suit===G.trump&&c.rank==='K')&&
         hand.some(c=>c.suit===G.trump&&c.rank==='Q');
}

// ── CARD ELEMENTS ──
function mkCard(c){
  let el=document.createElement('div');
  el.className='card '+((c.suit==='♥'||c.suit==='♦')?'red':'blk');
  el.innerHTML=`<span class="r">${c.rank}</span><span class="s">${c.suit}</span>`;
  return el;
}
function mkBack(){
  let el=document.createElement('div');
  el.className='card back sm';
  el.innerHTML='<div class="bp"></div>';
  return el;
}

// ── EXPOSE ──
window.createRoom=createRoom;
window.joinRoom=joinRoom;
window.hostStart=hostStart;
window.doTrump=doTrump;
window.doReveal=doReveal;
window.doMarriage=doMarriage;
window.playAgain=playAgain;
