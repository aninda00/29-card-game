<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>29 Card Game</title>
<style>
  *{box-sizing:border-box;margin:0;padding:0;}
  body{background:#1a1a2e;color:#e0e0e0;font-family:'Segoe UI',sans-serif;height:100vh;overflow:hidden;}
  .screen{display:none;flex-direction:column;align-items:center;justify-content:center;height:100vh;gap:14px;}
  .screen.active{display:flex;}
  h1{font-size:2rem;font-weight:300;letter-spacing:4px;color:#fff;}
  .subtitle{font-size:0.85rem;color:#888;letter-spacing:2px;}
  .btn{background:transparent;border:1px solid #444;color:#ccc;padding:10px 24px;border-radius:4px;cursor:pointer;font-size:0.85rem;letter-spacing:1px;transition:all 0.2s;}
  .btn:hover{border-color:#aaa;color:#fff;}
  .btn.primary{border-color:#7c6fff;color:#7c6fff;}
  .btn.primary:hover{background:#7c6fff22;}
  .btn.danger{border-color:#e05555;color:#e05555;}
  .btn.danger:hover{background:#e0555522;}
  .btn.gold{border-color:#c9a84c;color:#c9a84c;}
  .btn.gold:hover{background:#c9a84c22;}
  input{background:#242438;border:1px solid #333;color:#ccc;padding:10px 14px;border-radius:4px;font-size:0.85rem;outline:none;width:220px;}
  input:focus{border-color:#7c6fff;}
  .code-display{font-size:1.6rem;letter-spacing:6px;color:#7c6fff;font-weight:300;word-break:break-all;text-align:center;max-width:260px;padding:8px 12px;border:1px solid #2a2a45;border-radius:6px;background:#1e1e34;}
  #player-list{list-style:none;font-size:0.8rem;line-height:2.2;width:260px;}
  #player-list li{white-space:nowrap;overflow:hidden;text-overflow:ellipsis;padding:2px 0;}

  /* MAIN */
  #main-screen{display:none;flex-direction:column;height:100vh;background:#1a1a2e;}
  #main-screen.active{display:flex;}
  #info-bar{display:flex;justify-content:space-between;align-items:center;padding:6px 16px;border-bottom:1px solid #252540;font-size:0.75rem;flex-wrap:wrap;gap:4px;}
  .team-score{display:flex;gap:16px;}
  .ts{display:flex;flex-direction:column;align-items:center;}
  .ts .label{font-size:0.6rem;color:#555;letter-spacing:1px;}
  .ts .val{font-size:1rem;color:#ccc;}
  #trump-display{font-size:1.2rem;}
  #bid-display{font-size:0.72rem;color:#888;text-align:center;}
  #table{flex:1;display:grid;grid-template-areas:". top ." "left center right" ". bottom .";grid-template-columns:120px 1fr 120px;grid-template-rows:110px 1fr 110px;padding:8px;gap:4px;}
  .player-area{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:4px;}
  .player-area.bottom{grid-area:bottom;}
  .player-area.top{grid-area:top;}
  .player-area.left{grid-area:left;}
  .player-area.right{grid-area:right;}
  .player-name{font-size:0.65rem;letter-spacing:1px;color:#555;}
  .player-name.active-turn{color:#7c6fff;}
  .hand{display:flex;justify-content:center;}
  .hand.horizontal{flex-direction:row;flex-wrap:wrap;}
  .hand.vertical{flex-direction:column;}
  .card{width:42px;height:58px;border-radius:5px;border:1px solid #333;background:#242438;display:flex;flex-direction:column;align-items:center;justify-content:center;cursor:pointer;transition:transform 0.15s,box-shadow 0.15s;user-select:none;flex-shrink:0;margin:0 1px;}
  .card:hover{transform:translateY(-6px);box-shadow:0 8px 20px #0005;}
  .card.disabled{opacity:0.35;cursor:not-allowed;}
  .card.disabled:hover{transform:none;box-shadow:none;}
  .card.back{background:#1e1e34;border-color:#2a2a45;cursor:default;}
  .card.back:hover{transform:none;}
  .card .rank{font-size:0.8rem;font-weight:600;line-height:1;}
  .card .suit-sym{font-size:0.9rem;line-height:1;}
  .card.red .rank,.card.red .suit-sym{color:#e05555;}
  .card.black .rank,.card.black .suit-sym{color:#ddd;}
  .card.small{width:30px;height:42px;margin:1px;}
  .card.small .rank{font-size:0.6rem;}
  .card.small .suit-sym{font-size:0.7rem;}
  .back-pattern{width:26px;height:36px;border-radius:3px;background:repeating-linear-gradient(45deg,#2a2a50,#2a2a50 2px,#1e1e38 2px,#1e1e38 6px);}
  #center{grid-area:center;display:flex;align-items:center;justify-content:center;position:relative;}
  #trick-area{display:grid;grid-template-areas:". top ." "left mid right" ". bottom .";grid-template-columns:56px 56px 56px;grid-template-rows:66px 66px 66px;gap:2px;}
  #trick-area .pos-top{grid-area:top;display:flex;align-items:center;justify-content:center;}
  #trick-area .pos-bottom{grid-area:bottom;display:flex;align-items:center;justify-content:center;}
  #trick-area .pos-left{grid-area:left;display:flex;align-items:center;justify-content:center;}
  #trick-area .pos-right{grid-area:right;display:flex;align-items:center;justify-content:center;}
  #status{position:absolute;font-size:0.7rem;color:#333;letter-spacing:1px;pointer-events:none;}
  #trick-result{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);background:#1e1e34cc;border:1px solid #333;border-radius:6px;padding:6px 14px;font-size:0.75rem;color:#aaa;pointer-events:none;opacity:0;transition:opacity 0.3s;z-index:10;}
  #trick-result.show{opacity:1;}
  #controls{padding:8px 16px;border-top:1px solid #252540;display:flex;justify-content:center;align-items:center;gap:10px;min-height:48px;flex-wrap:wrap;}
  #msg{font-size:0.75rem;color:#888;text-align:center;}
  .tag{display:inline-block;font-size:0.6rem;padding:1px 6px;border-radius:10px;letter-spacing:1px;margin-left:4px;vertical-align:middle;}
  .tag.double{border:1px solid #e05555;color:#e05555;}
  .tag.marriage{border:1px solid #c9a84c;color:#c9a84c;}

  /* OVERLAYS */
  .ov{display:none;position:fixed;inset:0;background:#000c;z-index:50;flex-direction:column;align-items:center;justify-content:center;gap:14px;}
  .ov.active{display:flex;}
  .bid-btns{display:flex;gap:6px;flex-wrap:wrap;justify-content:center;max-width:300px;}
  .bid-btns .btn{padding:7px 12px;font-size:0.78rem;}
  .preview-hand{display:flex;gap:4px;margin-bottom:4px;}
  .wait-txt{font-size:0.85rem;color:#444;letter-spacing:2px;}
  .suit-row{display:flex;gap:12px;}
  .suit-btn{width:58px;height:58px;border-radius:8px;border:1px solid #333;background:transparent;font-size:1.6rem;cursor:pointer;transition:all 0.2s;}
  .suit-btn:hover{border-color:#7c6fff;background:#7c6fff22;transform:scale(1.05);}

  /* ROUND OVER MODAL */
  #round-ov{display:none;position:fixed;inset:0;background:#0009;z-index:100;align-items:center;justify-content:center;}
  #round-ov.active{display:flex;}
  .modal{background:#1e1e34;border:1px solid #2a2a45;border-radius:8px;padding:28px 36px;text-align:center;max-width:320px;}
  .modal h2{font-size:1.1rem;font-weight:400;margin-bottom:8px;}
  .modal .big{font-size:1.6rem;color:#7c6fff;margin:8px 0;}
  .score-table{width:100%;font-size:0.78rem;margin-bottom:16px;border-collapse:collapse;}
  .score-table td{padding:4px 8px;color:#888;}
  .score-table td:first-child{text-align:left;}
  .score-table td:last-child{text-align:right;color:#ccc;}
  .score-table tr.hi td{color:#7c6fff;}
  #toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:#1e1e34;border:1px solid #333;padding:8px 20px;border-radius:20px;font-size:0.78rem;color:#ccc;opacity:0;transition:opacity 0.3s;pointer-events:none;z-index:200;}
  #toast.show{opacity:1;}
</style>
</head>
<body>

<!-- HOME -->
<div id="home-screen" class="screen active">
  <h1>29</h1>
  <div class="subtitle">ONLINE MULTIPLAYER</div>
  <div style="height:8px"></div>
  <input id="my-name" placeholder="Your name" maxlength="16"/>
  <button class="btn primary" onclick="createRoom()" style="margin-top:4px">CREATE ROOM</button>
  <div style="display:flex;gap:8px;align-items:center;margin-top:4px">
    <input id="room-input" placeholder="Room code" maxlength="4" style="width:130px;text-transform:uppercase;letter-spacing:4px"/>
    <button class="btn" onclick="joinRoom()">JOIN</button>
  </div>
  <div style="font-size:0.7rem;color:#444;margin-top:4px">4 players · P1&P3 vs P2&P4</div>
</div>

<!-- LOBBY -->
<div id="lobby-screen" class="screen">
  <div class="subtitle">ROOM CODE</div>
  <div class="code-display" id="room-code-disp">----</div>
  <div style="font-size:0.72rem;color:#555;margin-bottom:4px">Share with friends</div>
  <ul id="player-list"></ul>
  <div id="wait-msg" style="font-size:0.75rem;color:#555;margin-top:4px"></div>
  <button class="btn primary" id="start-btn" style="display:none;margin-top:8px" onclick="hostStart()">START GAME</button>
</div>

<!-- MAIN GAME -->
<div id="main-screen" class="screen">
  <div id="info-bar">
    <div class="team-score">
      <div class="ts"><div class="label" id="lbl-a">P1&P3</div><div class="val" id="score-a">0</div></div>
      <div class="ts"><div class="label" id="lbl-b">P2&P4</div><div class="val" id="score-b">0</div></div>
    </div>
    <div id="bid-display">Bid: —</div>
    <div id="trump-display">🂠</div>
  </div>
  <div id="table">
    <div class="player-area top"><div class="player-name" id="nm-top">—</div><div class="hand horizontal" id="h-top"></div></div>
    <div class="player-area left"><div class="player-name" id="nm-left">—</div><div class="hand vertical" id="h-left"></div></div>
    <div id="center">
      <div id="trick-area"></div>
      <div id="status">—</div>
      <div id="trick-result"></div>
    </div>
    <div class="player-area right"><div class="player-name" id="nm-right">—</div><div class="hand vertical" id="h-right"></div></div>
    <div class="player-area bottom"><div class="player-name" id="nm-bottom">YOU</div><div class="hand horizontal" id="h-bottom"></div></div>
  </div>
  <div id="controls">
    <div id="msg">—</div>
    <button class="btn" id="reveal-btn" style="display:none" onclick="doRevealTrump()">REVEAL TRUMP</button>
    <button class="btn gold" id="marriage-btn" style="display:none" onclick="doMarriage()">💍 MARRIAGE</button>
  </div>
</div>

<!-- BID OVERLAY -->
<div id="bid-ov" class="ov">
  <div class="subtitle">BIDDING</div>
  <div style="font-size:0.7rem;color:#555;letter-spacing:1px">YOUR FIRST 4 CARDS</div>
  <div class="preview-hand" id="bid-preview"></div>
  <div style="font-size:0.9rem;color:#aaa">Current bid: <span id="cur-bid" style="color:#7c6fff;font-weight:600">—</span> by <span id="cur-bidder" style="color:#7c6fff">—</span></div>
  <div class="bid-btns" id="bid-btns"></div>
  <div id="bid-pass-wrap"></div>
  <div id="bid-wait" class="wait-txt" style="display:none"></div>
</div>

<!-- TRUMP OVERLAY -->
<div id="trump-ov" class="ov">
  <div class="subtitle">CHOOSE TRUMP</div>
  <div style="font-size:0.8rem;color:#666" id="trump-ov-info"></div>
  <div class="suit-row">
    <button class="suit-btn" onclick="doChooseTrump('♠')">♠</button>
    <button class="suit-btn" onclick="doChooseTrump('♥')">♥</button>
    <button class="suit-btn" onclick="doChooseTrump('♦')">♦</button>
    <button class="suit-btn" onclick="doChooseTrump('♣')">♣</button>
  </div>
</div>

<!-- DOUBLE OVERLAY -->
<div id="double-ov" class="ov">
  <div class="subtitle">DOUBLE?</div>
  <div style="font-size:0.8rem;color:#666;text-align:center;line-height:1.8" id="double-info"></div>
  <div style="display:flex;gap:12px" id="double-btns"></div>
  <div class="wait-txt" id="double-wait" style="display:none"></div>
</div>

<!-- ROUND OVER -->
<div id="round-ov">
  <div class="modal">
    <h2 id="ov-title">Round Over</h2>
    <div class="big" id="ov-main"></div>
    <table class="score-table" id="ov-table"></table>
    <button class="btn primary" style="margin-top:8px" onclick="playAgain()">PLAY AGAIN</button>
  </div>
</div>
<div id="toast"></div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getDatabase, ref, set, get, update, onValue, off }
  from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

const firebaseConfig = {
  apiKey:            "AIzaSyDPjd-rIUrp6HCxTSVTLqrWg_klxQDwCtY",
  authDomain:        "game-29-177ab.firebaseapp.com",
  databaseURL:       "https://game-29-177ab-default-rtdb.firebaseio.com",
  projectId:         "game-29-177ab",
  storageBucket:     "game-29-177ab.firebasestorage.app",
  messagingSenderId: "412974228088",
  appId:             "1:412974228088:web:e0cc330bb9a1892eaac38d",
};
const app = initializeApp(firebaseConfig);
const db  = getDatabase(app);

// ══════════════════════════════════════════
//  CONSTANTS  — exact copy from solo v12
// ══════════════════════════════════════════
const SUITS = ['♠','♥','♦','♣'];
const RANKS = ['7','8','9','10','J','Q','K','A'];
const PTS   = {7:0,8:0,9:2,10:1,J:3,Q:0,K:0,A:1};
const ORD   = {7:0,8:1,Q:2,K:3,10:4,A:5,9:6,J:7};

// ══════════════════════════════════════════
//  STATE
// ══════════════════════════════════════════
let myRoom = null;
let mySeat = null;   // 0-3
let G      = null;   // full game object mirrored from Firebase
let players = {};    // { 0:'Ali', 1:'Bob', ... }
let resolving = false; // guard so only 4th-card player resolves trick

// ══════════════════════════════════════════
//  FIREBASE HELPERS
// ══════════════════════════════════════════
const rRef = p => ref(db, p ? `rooms/${myRoom}/${p}` : `rooms/${myRoom}`);

// Firebase stores arrays as objects {0:x,1:x,...} — convert back safely
function toArr(x, len) {
  if (!x) return len ? Array(len).fill(null) : [];
  if (Array.isArray(x)) return x;
  let max = Math.max(0, ...Object.keys(x).map(Number));
  let out = [];
  for (let i = 0; i <= max; i++) out.push(x[i] !== undefined ? x[i] : null);
  return out;
}

// ══════════════════════════════════════════
//  UTILS
// ══════════════════════════════════════════
function shuffle(a){let b=[...a];for(let i=b.length-1;i>0;i--){let j=Math.random()*(i+1)|0;[b[i],b[j]]=[b[j],b[i]];}return b;}
function randCode(){return Math.random().toString(36).slice(2,6).toUpperCase();}
function pName(s){return (players[s]||`P${Number(s)+1}`);}
function showScreen(id){document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));document.getElementById(id).classList.add('active');}
function showOv(id){['bid-ov','trump-ov','double-ov'].forEach(o=>document.getElementById(o).classList.remove('active'));if(id)document.getElementById(id).classList.add('active');}
function setMsg(t){document.getElementById('msg').textContent=t;}
function showTrickResult(t){let e=document.getElementById('trick-result');e.textContent=t;e.classList.add('show');}
function hideTrickResult(){document.getElementById('trick-result').classList.remove('show');}
function toast(t){let e=document.getElementById('toast');e.textContent=t;e.classList.add('show');setTimeout(()=>e.classList.remove('show'),2500);}

// ══════════════════════════════════════════
//  LOBBY
// ══════════════════════════════════════════
async function createRoom(){
  let name = document.getElementById('my-name').value.trim()||'Player 1';
  myRoom = randCode(); mySeat = 0;
  await set(rRef(), { players:{0:name}, status:'lobby' });
  document.getElementById('room-code-disp').textContent = myRoom;
  showScreen('lobby-screen');
  listenLobby();
}

async function joinRoom(){
  let name = document.getElementById('my-name').value.trim()||'Player';
  let code = document.getElementById('room-input').value.trim().toUpperCase();
  if(!code){alert('Enter a room code');return;}
  myRoom = code;
  let d = (await get(rRef())).val();
  if(!d){alert('Room not found');myRoom=null;return;}
  if(d.status!=='lobby'){alert('Game already started');myRoom=null;return;}
  let taken = Object.keys(d.players||{}).map(Number);
  let seat  = [0,1,2,3].find(s=>!taken.includes(s));
  if(seat===undefined){alert('Room full');myRoom=null;return;}
  mySeat = seat;
  await update(rRef('players'),{[seat]:name});
  document.getElementById('room-code-disp').textContent = myRoom;
  showScreen('lobby-screen');
  listenLobby();
}

function listenLobby(){
  onValue(rRef(), snap=>{
    let d = snap.val(); if(!d) return;
    players = d.players||{};
    let ul = document.getElementById('player-list');
    ul.innerHTML='';
    for(let s=0;s<4;s++){
      let li=document.createElement('li');
      li.textContent = players[s]?`Seat ${s+1}: ${players[s]}${s==mySeat?' (You)':''}`:`Seat ${s+1}: waiting...`;
      li.style.color = players[s]?'#ccc':'#333';
      ul.appendChild(li);
    }
    let cnt = Object.keys(players).length;
    document.getElementById('wait-msg').textContent = cnt<4?`Waiting for ${4-cnt} more...`:'All players ready!';
    document.getElementById('start-btn').style.display = (mySeat===0&&cnt===4)?'inline-block':'none';
    if(d.status==='playing'&&d.game){
      off(rRef());
      G=d.game; players=d.players||{};
      showScreen('main-screen');
      listenGame();
      renderAll();
    }
  });
}

// ══════════════════════════════════════════
//  HOST — start game (same deal logic as solo v12)
// ══════════════════════════════════════════
async function hostStart(){
  let deck = shuffle(SUITS.flatMap(s=>RANKS.map(r=>({suit:s,rank:r}))));
  // Deal 4 cards first, 4 more after bidding — same as solo v12
  let first4 = [deck.slice(0,4), deck.slice(4,8), deck.slice(8,12), deck.slice(12,16)];
  let last4   = [deck.slice(16,20), deck.slice(20,24), deck.slice(24,28), deck.slice(28,32)];
  let game = {
    first4, last4,
    hands:   first4.map(h=>h.map(c=>({...c}))),  // start with first 4
    bid:15, bidder:-1, bidWinner:-1,
    trump:null, trumpRevealed:false,
    doubled:false, marriageDeclared:false,
    trick:[null,null,null,null],
    trickLeader:0, currentPlayer:0,
    trickPoints:[0,0], tricksWon:[0,0], tricksPlayed:0,
    phase:'bid', passCount:0,
    totalScores:[0,0], doubleVotes:{},
  };
  await update(rRef(),{status:'playing', game});
}

// ══════════════════════════════════════════
//  GAME LISTENER
// ══════════════════════════════════════════
function listenGame(){
  onValue(rRef('game'), snap=>{
    let d = snap.val(); if(!d) return;
    G = d;
    renderAll();
  });
}

// ══════════════════════════════════════════
//  RENDER — mirrors solo v12 renderAll()
// ══════════════════════════════════════════
function renderAll(){
  if(!G) return;
  renderInfoBar();
  renderNames();
  renderHands();
  renderTrickArea();
  renderPhaseUI();
}

function renderInfoBar(){
  let td = document.getElementById('trump-display');
  if(G.trumpRevealed){ td.textContent=G.trump; td.style.color=(G.trump==='♥'||G.trump==='♦')?'#e05555':'#ddd'; }
  else { td.textContent='🂠'; td.style.color=''; }
  let dTag = G.doubled?'<span class="tag double">DOUBLED</span>':'';
  let mTag = G.marriageDeclared?'<span class="tag marriage">MARRIAGE</span>':'';
  let by   = G.bidWinner>=0?pName(G.bidWinner):(G.bidder>=0?pName(G.bidder):'—');
  document.getElementById('bid-display').innerHTML = `Bid: ${G.bid} (${by})${dTag}${mTag}`;
  document.getElementById('score-a').textContent = toArr(G.trickPoints,2)[0]||0;
  document.getElementById('score-b').textContent = toArr(G.trickPoints,2)[1]||0;
  document.getElementById('lbl-a').textContent = `${pName(0)}&${pName(2)}`;
  document.getElementById('lbl-b').textContent = `${pName(1)}&${pName(3)}`;
}

function renderNames(){
  let pos = ['bottom','left','top','right'];
  for(let rel=0;rel<4;rel++){
    let abs = (mySeat+rel)%4;
    let el  = document.getElementById('nm-'+pos[rel]);
    if(!el) continue;
    el.textContent  = rel===0?'YOU':pName(abs);
    el.className    = 'player-name'+(G.currentPlayer===abs?' active-turn':'');
  }
}

function renderHands(){
  // ── My hand (bottom) — real cards, only shown during play phase ──
  let myEl = document.getElementById('h-bottom');
  myEl.innerHTML = '';
  if(G.phase==='play'||G.phase==='over'){
    let hand = toArr(G.hands[mySeat]).filter(x=>x); // compact for display
    hand.forEach((c,i)=>{
      if(!c) return;
      let el = makeCard(c);
      if(G.currentPlayer===mySeat && isValid(mySeat,c)){
        el.onclick = ()=>playCard(i); // i = index in compacted array
      } else {
        el.classList.add('disabled');
      }
      myEl.appendChild(el);
    });
  }
  // ── Other players — back of cards ──
  ['left','top','right'].forEach((pos,ri)=>{
    let abs  = (mySeat+ri+1)%4;
    let cont = document.getElementById('h-'+pos);
    cont.innerHTML = '';
    let n = toArr(G.hands[abs]).filter(x=>x).length;
    for(let i=0;i<n;i++) cont.appendChild(makeBack());
  });
}

function renderTrickArea(){
  let ta    = document.getElementById('trick-area');
  ta.innerHTML = '';
  let trick = toArr(G.trick,4);
  let pos   = ['pos-bottom','pos-left','pos-top','pos-right'];
  for(let rel=0;rel<4;rel++){
    let abs  = (mySeat+rel)%4;
    let wrap = document.createElement('div');
    wrap.className = pos[rel];
    if(trick[abs]){ let ce=makeCard(trick[abs]); ce.style.cursor='default'; wrap.appendChild(ce); }
    ta.appendChild(wrap);
  }
  document.getElementById('status').style.display = trick.filter(x=>x).length?'none':'block';
}

// ══════════════════════════════════════════
//  PHASE UI  (overlays + controls bar)
// ══════════════════════════════════════════
function renderPhaseUI(){
  showOv(null);
  document.getElementById('reveal-btn').style.display   = 'none';
  document.getElementById('marriage-btn').style.display = 'none';
  setMsg('');

  let phase = G.phase;
  if     (phase==='bid')    renderBidOv();
  else if(phase==='trump')  renderTrumpOv();
  else if(phase==='double') renderDoubleOv();
  else if(phase==='play')   renderPlayControls();
  else if(phase==='over')   showRoundOver();
}

// ── BID OVERLAY ──
function renderBidOv(){
  showOv('bid-ov');
  // Show my first 4 cards
  let pc = document.getElementById('bid-preview');
  pc.innerHTML = '';
  toArr(G.first4[mySeat]).forEach(c=>{ if(c) pc.appendChild(makeCard(c)); });
  // Current bid info
  document.getElementById('cur-bid').textContent    = G.bidder>=0 ? G.bid : '—';
  document.getElementById('cur-bidder').textContent = G.bidder>=0 ? pName(G.bidder) : '—';
  let btns = document.getElementById('bid-btns');
  let pw   = document.getElementById('bid-pass-wrap');
  let wait = document.getElementById('bid-wait');
  btns.innerHTML=''; pw.innerHTML=''; wait.style.display='none';

  if(G.currentPlayer===mySeat){
    // Bid number buttons
    for(let b=G.bid+1; b<=28; b++){
      let btn = document.createElement('button');
      btn.className = 'btn'; btn.textContent = b;
      btn.style.cssText = 'padding:7px 12px;font-size:0.78rem;';
      btn.onclick = ()=>doBid(b);
      btns.appendChild(btn);
    }
    // Pass button — not available on very first action if nobody has bid yet
    if(G.bidder!==-1 || G.passCount>0){
      let pb = document.createElement('button');
      pb.className='btn'; pb.textContent='PASS';
      pb.onclick=()=>doBid(0);
      pw.appendChild(pb);
    }
  } else {
    wait.style.display = 'block';
    wait.textContent = G.currentPlayer>=0
      ? `${pName(G.currentPlayer).toUpperCase()} IS BIDDING...`
      : 'WAITING...';
  }
}

// ── TRUMP OVERLAY ──
function renderTrumpOv(){
  if(G.bidWinner===mySeat){
    showOv('trump-ov');
    document.getElementById('trump-ov-info').textContent = `You won the bid with ${G.bid}. Pick trump:`;
  } else {
    showOv(null);
    setMsg(`${pName(G.bidWinner)} is choosing trump...`);
  }
}

// ── DOUBLE OVERLAY ──
function renderDoubleOv(){
  let bidTeam = G.bidWinner%2;
  let myTeam  = mySeat%2;
  let votes   = G.doubleVotes||{};
  let myVote  = votes[mySeat];

  if(myTeam!==bidTeam && myVote===undefined){
    // My team opposes — I can vote
    showOv('double-ov');
    document.getElementById('double-info').textContent =
      `${pName(G.bidWinner)} bid ${G.bid}.\nDouble = ×2 points for winning team.`;
    let db2 = document.getElementById('double-btns'); db2.innerHTML='';
    let d = document.createElement('button'); d.className='btn danger'; d.textContent='DOUBLE'; d.onclick=()=>voteDouble(true);
    let p = document.createElement('button'); p.className='btn';        p.textContent='PASS';   p.onclick=()=>voteDouble(false);
    db2.appendChild(d); db2.appendChild(p);
    document.getElementById('double-wait').style.display='none';
  } else if(myTeam!==bidTeam && myVote!==undefined){
    // Voted, waiting for teammate
    showOv('double-ov');
    document.getElementById('double-info').textContent = 'Waiting for your teammate...';
    document.getElementById('double-btns').innerHTML   = '';
    document.getElementById('double-wait').style.display = 'block';
    document.getElementById('double-wait').textContent = `Your vote: ${myVote?'DOUBLE':'PASS'}`;
  } else {
    // Bid team — just wait
    showOv(null);
    setMsg('Opponents deciding to double...');
  }
}

// ── PLAY CONTROLS ──
function renderPlayControls(){
  showOv(null);
  if(G.currentPlayer===mySeat){
    setMsg('Your turn — play a card');
    if(!G.trumpRevealed && G.bidWinner===mySeat)
      document.getElementById('reveal-btn').style.display='inline-block';
    if(canMarriage())
      document.getElementById('marriage-btn').style.display='inline-block';
  } else {
    setMsg(`${pName(G.currentPlayer)}'s turn`);
  }
}

// ══════════════════════════════════════════
//  ACTIONS  — write to Firebase
// ══════════════════════════════════════════

// ── BID ──
async function doBid(val){
  if(G.currentPlayer!==mySeat || G.phase!=='bid') return;
  let passCount = val===0 ? (G.passCount||0)+1 : 0;
  let bidder    = val===0 ? G.bidder : mySeat;
  let bid       = val===0 ? G.bid    : val;
  let next      = (mySeat+1)%4;
  let done      = (passCount>=3 && bidder!==-1) || passCount===4;

  if(done){
    let bidWinner  = bidder===-1 ? 0 : bidder;
    let finalBid   = bidder===-1 ? 16 : bid;
    // Give everyone all 8 cards — same as solo v12
    let fullHands  = toArr(G.first4).map((h,p)=>[...toArr(h),...toArr(toArr(G.last4)[p])]);
    await update(rRef('game'),{
      bid:finalBid, bidder:bidWinner, bidWinner,
      passCount, hands:fullHands,
      phase:'trump', currentPlayer:bidWinner,
    });
  } else {
    await update(rRef('game'),{bid, bidder, passCount, currentPlayer:next});
  }
}

// ── CHOOSE TRUMP ──
async function doChooseTrump(suit){
  if(G.bidWinner!==mySeat || G.phase!=='trump') return;
  await update(rRef('game'),{
    trump:suit, phase:'double', currentPlayer:-1, doubleVotes:{}
  });
}

// ── DOUBLE VOTE ──
async function voteDouble(val){
  let bidTeam = G.bidWinner%2;
  if(mySeat%2===bidTeam || G.phase!=='double') return;
  // Write my vote
  await update(rRef('game/doubleVotes'),{[mySeat]:val});
  // Check if both opposing players have voted
  let oppSeats = [0,1,2,3].filter(s=>s%2!==bidTeam);
  let snap     = await get(rRef('game/doubleVotes'));
  let votes    = snap.val()||{};
  if(oppSeats.every(s=>votes[s]!==undefined)){
    let doubled = oppSeats.some(s=>votes[s]===true);
    await update(rRef('game'),{
      doubled, phase:'play',
      currentPlayer: G.bidWinner,
      trickLeader:   G.bidWinner,
    });
  }
}

// ── PLAY CARD ──
async function playCard(idx){
  if(G.currentPlayer!==mySeat || G.phase!=='play') return;
  // Use raw hand array (with nulls intact) so idx matches exactly
  let hand = toArr(G.hands[mySeat]);
  // Find the idx-th non-null card
  let count = -1;
  let realIdx = -1;
  for(let i=0;i<hand.length;i++){
    if(hand[i]){ count++; if(count===idx){ realIdx=i; break; } }
  }
  if(realIdx===-1) return;
  let card = hand[realIdx];
  if(!card || !isValid(mySeat,card)) return;

  // Remove card — set to null so other indices stay stable
  let newHand = hand.map((c,i)=>i===realIdx?null:c).filter(x=>x); // compact nulls out

  // Build trick safely
  let trick = toArr(G.trick,4).map(c=>c||null);
  trick[mySeat] = card;

  let trumpRevealed = G.trumpRevealed || (card.suit===G.trump);
  let played        = trick.filter(x=>x).length;
  let nextPlayer    = played===4 ? -1 : (mySeat+1)%4;

  await update(rRef('game'),{
    [`hands/${mySeat}`]: newHand,
    trick,
    trumpRevealed,
    currentPlayer: nextPlayer,
  });

  if(played===4 && !resolving){
    resolving = true;
    setTimeout(async()=>{ await resolveTrick(); resolving=false; }, 1000);
  }
}

// ── RESOLVE TRICK (exact logic from solo v12) ──
async function resolveTrick(){
  let snap = await get(rRef('game'));
  let g    = snap.val();
  if(!g || g.phase!=='play') return;
  let trick = toArr(g.trick,4);
  if(trick.filter(x=>x).length<4) return;

  let leader  = Number(g.trickLeader)||0;
  let ledSuit = trick[leader].suit;
  let winner  = leader;
  for(let i=0;i<4;i++){
    if(!trick[i]||i===winner) continue;
    if(beats(trick[i], trick[winner], ledSuit, g.trump, g.trumpRevealed)) winner=i;
  }

  let team = winner%2;
  let pts  = trick.reduce((s,c)=>{
    if(!c) return s;
    if(!g.trumpRevealed && c.suit===g.trump) return s;
    return s + (PTS[c.rank]||0);
  },0);

  // Explicitly parse existing scores as numbers to avoid string concat
  let tp = toArr(g.trickPoints,2).map(v=>Number(v)||0);
  let tw = toArr(g.tricksWon,2).map(v=>Number(v)||0);
  tp[team] += pts;
  tw[team]++;
  let tricksPlayed = (Number(g.tricksPlayed)||0) + 1;
  if(tricksPlayed===8) tp[team] += 1;  // last trick bonus

  let isOver = tricksPlayed===8;
  let ts     = toArr(g.totalScores,2).map(v=>Number(v)||0);
  if(isOver){
    let bt   = Number(g.bidWinner)%2;
    let met  = tp[bt] >= Number(g.bid);
    let mult = g.doubled ? 2 : 1;
    if(met) ts[bt]+=mult; else ts[1-bt]+=mult;
  }

  showTrickResult(`${pName(winner)} won +${pts}pts`);
  setTimeout(()=>hideTrickResult(), 1100);

  await update(rRef('game'),{
    trick:         [null,null,null,null],
    trickPoints:   tp,
    tricksWon:     tw,
    tricksPlayed,
    trickLeader:   winner,
    currentPlayer: winner,
    totalScores:   ts,
    phase: isOver ? 'over' : 'play',
  });
}

// ── REVEAL TRUMP ──
async function doRevealTrump(){
  if(G.bidWinner!==mySeat||G.trumpRevealed||G.phase!=='play') return;
  await update(rRef('game'),{trumpRevealed:true});
}

// ── MARRIAGE ──
async function doMarriage(){
  if(!canMarriage()) return;
  let newBid = Math.max(15, G.bid-3);
  await update(rRef('game'),{marriageDeclared:true, bid:newBid});
  toast('💍 Marriage! Bid −3');
}

// ══════════════════════════════════════════
//  CARD LOGIC — exact copy from solo v12
// ══════════════════════════════════════════
function cardStr(c, ledSuit, trump, revealed){
  if(!revealed)        return PTS[c.rank]*10 + ORD[c.rank];
  if(c.suit===trump)   return 200 + ORD[c.rank];
  if(c.suit===ledSuit) return 100 + ORD[c.rank];
  return ORD[c.rank];
}
function beats(c, w, ledSuit, trump, revealed){
  return cardStr(c,ledSuit,trump,revealed) > cardStr(w,ledSuit,trump,revealed);
}
function isValid(p, card){
  if(!G || G.currentPlayer!==p || G.phase!=='play') return false;
  let trick = toArr(G.trick,4);
  let led = null;
  for(let i=0;i<4;i++) if(trick[i]){ led=trick[i]; break; }
  if(!led) return true;   // leading — any card ok
  let ls   = led.suit;
  let hand = toArr(G.hands[p]).filter(x=>x);
  // Must follow led suit if possible
  if(hand.some(c=>c.suit===ls)) return card.suit===ls;
  // Can't follow — must play trump if revealed and available
  if(G.trumpRevealed && hand.some(c=>c.suit===G.trump)) return card.suit===G.trump;
  return true;   // no led suit, no trump → any card
}
function canMarriage(){
  if(!G||!G.trumpRevealed||G.bidWinner!==mySeat||G.marriageDeclared||G.phase!=='play') return false;
  let hand = toArr(G.hands[mySeat]).filter(x=>x);
  return hand.some(c=>c.suit===G.trump&&c.rank==='K') &&
         hand.some(c=>c.suit===G.trump&&c.rank==='Q');
}

// ══════════════════════════════════════════
//  ROUND OVER — same scoring as solo v12
// ══════════════════════════════════════════
function showRoundOver(){
  document.getElementById('round-ov').classList.add('active');
  let bt  = G.bidWinner%2;
  let tp  = toArr(G.trickPoints,2);
  let met = (tp[bt]||0) >= G.bid;
  let win = (mySeat%2===bt)===met;
  document.getElementById('ov-title').textContent = win?'🎉 Your Team Wins!':'😔 Your Team Loses';
  document.getElementById('ov-main').textContent  = met?'Bid Met!':'Bid Failed!';
  let ts  = toArr(G.totalScores,2);
  document.getElementById('ov-table').innerHTML = `
    <tr><td>Bid</td><td>${G.bid} by ${pName(G.bidWinner)}</td></tr>
    <tr><td>${pName(0)}&${pName(2)} trick pts</td><td>${tp[0]||0}</td></tr>
    <tr><td>${pName(1)}&${pName(3)} trick pts</td><td>${tp[1]||0}</td></tr>
    ${G.doubled?'<tr class="hi"><td>Doubled</td><td>×2</td></tr>':''}
    ${G.marriageDeclared?'<tr class="hi"><td>Marriage</td><td>−3 bid</td></tr>':''}
    <tr><td colspan="2" style="padding-top:8px;border-top:1px solid #252540"></td></tr>
    <tr class="hi"><td>${pName(0)}&${pName(2)} total</td><td>${ts[0]||0}</td></tr>
    <tr class="hi"><td>${pName(1)}&${pName(3)} total</td><td>${ts[1]||0}</td></tr>
  `;
}

async function playAgain(){
  document.getElementById('round-ov').classList.remove('active');
  if(mySeat===0) await update(rRef(),{status:'lobby', game:null});
  showScreen('lobby-screen');
  listenLobby();
}

//  CARD ELEMENTS
// ══════════════════════════════════════════
function makeCard(c){
  let el = document.createElement('div');
  el.className = 'card '+((c.suit==='♥'||c.suit==='♦')?'red':'black');
  el.innerHTML = `<span class="rank">${c.rank}</span><span class="suit-sym">${c.suit}</span>`;
  return el;
}
function makeBack(){
  let el = document.createElement('div');
  el.className = 'card back small';
  el.innerHTML = '<div class="back-pattern"></div>';
  return el;
}

window.createRoom     = createRoom;
window.joinRoom       = joinRoom;
window.hostStart      = hostStart;
